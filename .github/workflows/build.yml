name: Mobile DLL Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # This builds the project and forces all output files directly into an 'output' folder
    - name: Build Project to Specific Folder
      run: dotnet build --configuration Release --output ./output /p:OutputType=Library

    # This uploads everything that was compiled without needing to search deep folders
    - name: Upload Everything From Output Folder
      uses: actions/upload-artifact@v4
      with:
        name: Compiled-Files
        path: ./output/
